name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ci-firebase-api-key
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-project.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-project.firebasestorage.app
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
  NEXT_PUBLIC_ENCRYPTION_KEY: ci-encryption-key-32-characters-minimum
  NEXT_PUBLIC_APP_URL: https://takken-study.com
  OPENAI_API_KEY: sk-ci-placeholder

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release checks
        run: npm run verify:release

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        run: npm run test:e2e:smoke
